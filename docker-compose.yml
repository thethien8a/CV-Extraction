services:
  postgres:
    image: postgres:15
    container_name: topcv-postgres
    environment:
      POSTGRES_USER: topcv
      POSTGRES_PASSWORD: topcv_pass
      POSTGRES_DB: topcv
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: topcv-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
